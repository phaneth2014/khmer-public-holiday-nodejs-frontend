[build]
  command = "npm --prefix client install --legacy-peer-deps && npm --prefix client run build"
  publish = "client/dist"
  functions = "netlify/functions"

# ADD THIS SECTION BELOW
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pg"]

# 1. Specific rule for the IP lookup (Bypasses AdBlockers)
[[redirects]]
  from = "/api/get-location"
  to = "https://ipapi.co/"
  status = 200
  force = true

# 2. Specific rule for the IP lookup (Bypasses AdBlockers)
[[redirects]]
  from = "/api/get-ip"
  to = "https://api.ipify.org?format=json"
  status = 200
  force = true

# backend 3. Your existing wildcard rule for other functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Content Security Policy (SCP)
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self' https://khmer-calendar.netlify.app;"

# fallback for SPA 
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

  [dev]
  port = 8888
  publish = "public"
