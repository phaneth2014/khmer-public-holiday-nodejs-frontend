    бһ•бҹ’бһҸбһӣбҹӢбһҸбһҳбҹ’бһӣбҹғ бһўбһҸбҹ’бһҡбһ¶бһ”бҹ’бһҸбһјбһҡбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ”бҹ’бһҡбһ…бһ¶бҹҶбһҗбҹ’бһ„бҹғ бһҠбҹ„бһҷбһҷбҹ„бһ„ бһ“бһ·бһ„ бһҠбһҖбһҹбҹ’бһҡбһ„бҹӢбһ–бһё бһӮбҹҒбһ бһ‘бҹҶбһ–бҹҗбһҡбһҡбһ”бһҹбҹӢ бһ’бһ“бһ¶бһӮбһ¶бһҡбһҮбһ¶бһҸбһ· бһ“бҹғбһҖбһҳбҹ’бһ–бһ»бһҮбһ¶ https://www.nbc.gov.kh/
    бһўбһ“бһ»бһЎбҹ„бһҳбһ‘бҹ…бһҸбһ¶бһҳ бһҖбҹ’бһҡбһҹбһҪбһ„бһ–бһ“бҹ’бһ’бһҠбһ¶ бһ“бһ·бһ„ бһҸбһҳбҹ’бһӣбҹғбһ бһ¶бһ„бһҶбҹҒбһ„ бһҮбһ¶бһ”бҹ’бһҡбһ…бһ¶бҹҶ бһҠбҹ„бһҷбһҘбһҸбһӮбһ·бһҸбһҗбҹ’бһӣбҹғ бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бҹ’бһҡбһҮбһ¶бһ–бһӣбһҡбһҠбҹ’бһӢ бһ“бһ·бһ„бһўбһ¶бһҮбһёбһңбһҖбһҳбҹ’бһҳбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһ”бҹ’бһҡбһ‘бҹҒбһҹбһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бҹ”
    бһӣбҹ„бһҖбһўбҹ’бһ“бһҖбһҖбҹҸбһўбһ¶бһ…бһ…бһјбһӣбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҹбҹҒбһңбһ¶ API бһҠбҹ„бһҷбһҘбһҸбһӮбһ·бһҸбһҗбҹ’бһӣбҹғбһҠбһҫбһҳбҹ’бһ”бһёбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһўбһҸбҹ’бһҡбһ¶бһ”бҹ’бһҸбһјбһҡбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ•бҹ’бһӣбһјбһңбһҖбһ¶бһҡ бһ“бһ·бһ„бһҸбһҳбҹ’бһӣбҹғбһ бһ¶бһ„бһҶбҹҒбһ„бҹ”">
